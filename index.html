<!doctype html>
<html lang="es">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width,initial-scale=1" />
    <title>Servicios</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet" />
</head>

<body class="bg-light">
    <div class="container py-4">
        <h3>🚖 Sistema de Servicios</h3>
        <input id="b" class="form-control my-3" placeholder="Buscar..." oninput="render()" />
        <table class="table table-bordered bg-white">
            <thead class="table-dark">
                <tr>
                    <th>Cliente</th>
                    <th>Recojo</th>
                    <th>Destino</th>
                    <th>Hora</th>
                    <th>Estado</th>
                    <th>Acción</th>
                </tr>
            </thead>
            <tbody id="t"></tbody>
        </table>
    </div>
    <script>
        const init = [
            ["Juan Pérez", "Plaza San Miguel", "Aeropuerto Jorge Chávez", "08:30"],
            ["María López", "Av. La Marina 2000, San Miguel (Plaza San Miguel)", "Av. Elmer Faucett s/n, Callao (Aeropuerto Jorge Chávez)", "13:30"],
            ["Carlos Díaz", "Av. Larco 812, Miraflores", "Jr. de la Unión 300, Cercado de Lima", "14:50"],
            ["Ana Torres", "Av. Caminos del Inca 257, Santiago de Surco", "Av. Dos de Mayo 1500, San Isidro", "15:30"],
            ["Luis García", "Av. Alfredo Mendiola 3698, Independencia (MegaPlaza)", "Av. Tomás Valle 501, San Martín de Porres", "16:30"],
            ["Sofía Ramos", "Av. Brasil 714, Breña", "Av. Universitaria 1801, San Miguel (PUCP)", "17:50"],
            ["Diego Ruiz", "Av. Sáenz Peña 901, Callao", "Malecón de la Reserva 610, Miraflores (Larcomar)", "18:40"],
            ["Valeria Soto", "Av. Grau 1010, Barranco", "Av. Alfredo Benavides 347, Miraflores", "19:50"],
            ["Pedro León", "Jr. Trujillo 560, Rímac", "Av. Abancay 145, Cercado de Lima", "20:30"],
            ["Camila Flores", "Av. Huaylas 1700, Chorrillos", "Av. Primavera 1200, Santiago de Surco", "21:10"],
            ["Jorge Silva", "Av. Aviación 2500, San Borja", "Jr. Gamarra 1160, La Victoria", "21:50"],
            ["Lucía Vega", "Av. Nicolás Ayllón 2900, Ate", "Av. Javier Prado Este 4200, Santiago de Surco (Jockey Plaza)", "22:30"],
            ["Kevin Castro", "Av. Túpac Amaru 3200, Comas", "Av. Alfredo Mendiola 1400, Los Olivos", "23:10"],
            ["Rosa Peña", "Av. Arica 698, Breña", "Av. Arenales 1700, Lince", "23:50"],
            ["Miguel Paz", "Av. Brasil 3890, Magdalena del Mar", "Av. La Marina 2355, San Miguel", "00:30"],
            ["Andrea Castillo", "Av. Canadá 1450, La Victoria", "Av. Angamos Este 1803, Surquillo", "00:50"],
            ["José Herrera", "Av. Petit Thouars 4999, Miraflores", "Av. José Pardo 885, Miraflores", "1:30"],
            ["Natalia Rojas", "Av. Universitaria 2500, Los Olivos", "Av. Javier Prado Este 4200, Santiago de Surco (Jockey Plaza)", "1:50"],
            ["Ricardo Salazar", "Av. Nicolás de Piérola 650, Cercado de Lima", "Av. Paseo de la República 2000, San Isidro", "2:30"],
        ];
        let d = JSON.parse(localStorage.getItem("srv"));
        if (!d) {
            d = init.map((x) => ({
                c: x[0],
                r: x[1],
                de: x[2],
                h: x[3],
                e: "Sin empezar",
            }));
            save();
        }
        function save() {
            localStorage.setItem("srv", JSON.stringify(d));
        }
        function badge(e) {
            return e == "Sin empezar"
                ? '<span class="badge bg-secondary">' + e + "</span>"
                : e == "En ruta"
                    ? '<span class="badge bg-warning text-dark">' + e + "</span>"
                    : '<span class="badge bg-success">' + e + "</span>";
        }
        function act(i) {
            if (d[i].e == "Sin empezar") d[i].e = "En ruta";
            else if (d[i].e == "En ruta") d[i].e = "Finalizado";
            save();
            render();
        }
        function route(r, de) {
            open(
                "https://www.google.com/maps/dir/" +
                encodeURIComponent(r) +
                "/" +
                encodeURIComponent(de),
            );
        }
        function render() {
            let q = b.value.toLowerCase();
            t.innerHTML = "";
            d.forEach((x, i) => {
                if ((x.c + x.r + x.de).toLowerCase().includes(q)) {
                    let btn =
                        x.e == "Finalizado"
                            ? '<button class="btn btn-success btn-sm" disabled>✔</button>'
                            : '<button class="btn btn-primary btn-sm" onclick="act(' +
                            i +
                            ')">' +
                            (x.e == "Sin empezar" ? "Iniciar" : "Finalizar") +
                            "</button>";
                    t.innerHTML += `<tr><td>${x.c}</td><td>${x.r}</td><td>${x.de}</td><td>${x.h}</td><td>${badge(x.e)}</td><td><button class="btn btn-outline-secondary btn-sm me-1" onclick="route('${x.r}','${x.de}')">Ruta</button>${btn}</td></tr>`;
                }
            });
        }
        render();
    </script>
</body>

</html>
'''
