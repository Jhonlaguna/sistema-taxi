                de: x[2],
                h: x[3],
                e: "Sin empezar",
            }));
            save();
        }
        function save() {
            localStorage.setItem("srv", JSON.stringify(d));
        }
        function badge(e) {
            return e == "Sin empezar"
                ? '<span class="badge bg-secondary">' + e + "</span>"
                : e == "En ruta"
                    ? '<span class="badge bg-warning text-dark">' + e + "</span>"
                    : '<span class="badge bg-success">' + e + "</span>";
        }
        function act(i) {
            if (d[i].e == "Sin empezar") d[i].e = "En ruta";
            else if (d[i].e == "En ruta") d[i].e = "Finalizado";
            save();
            render();
        }
        function route(r, de) {
            open(
                "https://www.google.com/maps/dir/" +
                encodeURIComponent(r) +
                "/" +
                encodeURIComponent(de),
            );
        }
        function render() {
            let q = b.value.toLowerCase();
            t.innerHTML = "";
            d.forEach((x, i) => {
                if ((x.c + x.r + x.de).toLowerCase().includes(q)) {
                    let btn =
                        x.e == "Finalizado"
                            ? '<button class="btn btn-success btn-sm" disabled>✔</button>'
                            : '<button class="btn btn-primary btn-sm" onclick="act(' +
                            i +
                            ')">' +
                            (x.e == "Sin empezar" ? "Iniciar" : "Finalizar") +
                            "</button>";
                    t.innerHTML += `<tr><td>${x.c}</td><td>${x.r}</td><td>${x.de}</td><td>${x.h}</td><td>${badge(x.e)}</td><td><button class="btn btn-outline-secondary btn-sm me-1" onclick="route('${x.r}','${x.de}')">Ruta</button>${btn}</td></tr>`;

            });
        }
        render();
